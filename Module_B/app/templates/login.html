<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuttle System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.82);
            --card-border: rgba(255, 255, 255, 0.55);
            --text-dark: #0f172a;
            --muted: #475569;
            --primary: #3b82f6;
            --primary-2: #8b5cf6;
        }

        body {
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 20%, #1e3a8a 0%, #111827 42%, #020617 100%);
            color: var(--text-dark);
            animation: bgPulse 12s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { filter: saturate(1); }
            50% { filter: saturate(1.18); }
        }

        .bg-orb {
            position: fixed;
            border-radius: 999px;
            filter: blur(8px);
            opacity: 0.55;
            animation: drift 15s ease-in-out infinite;
            pointer-events: none;
        }

        .orb-1 {
            width: 320px;
            height: 320px;
            left: -80px;
            top: 8%;
            background: linear-gradient(45deg, #60a5fa, #6366f1);
        }

        .orb-2 {
            width: 280px;
            height: 280px;
            right: -70px;
            top: 52%;
            background: linear-gradient(45deg, #c084fc, #ec4899);
            animation-delay: -4s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            left: 48%;
            bottom: -70px;
            background: linear-gradient(45deg, #22d3ee, #10b981);
            animation-delay: -8s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(24px, -24px) scale(1.07); }
        }

        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            z-index: 2;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            box-shadow: 0 22px 50px rgba(2, 6, 23, 0.42);
            animation: floatIn 0.9s ease-out;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: -120% -35%;
            background: linear-gradient(115deg, transparent 35%, rgba(255, 255, 255, 0.35) 50%, transparent 65%);
            transform: translateX(-100%);
            animation: cardSheen 5.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes cardSheen {
            0%, 70%, 100% { transform: translateX(-120%) rotate(8deg); }
            88% { transform: translateX(120%) rotate(8deg); }
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(25px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.85rem;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #1e1b4b;
            background: linear-gradient(90deg, #c4b5fd, #93c5fd);
            margin-bottom: 0.9rem;
            animation: pulseBadge 2.2s ease-in-out infinite;
        }

        @keyframes pulseBadge {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .login-title {
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.35rem;
        }

        .login-subtitle {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
        }

        .form-label {
            color: #334155;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dbe3ee;
            padding: 0.72rem 0.9rem;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-control:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 0.24rem rgba(129, 140, 248, 0.2);
            transform: translateY(-1px);
        }

        .btn-login {
            border: none;
            border-radius: 12px;
            padding: 0.72rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--primary-2));
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: "";
            position: absolute;
            top: 0;
            left: -130%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
            transform: skewX(-22deg);
            transition: left 0.55s ease;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(76, 29, 149, 0.3);
        }

        .btn-login:hover::before {
            left: 130%;
        }

        .alert {
            border-radius: 12px;
            border: none;
        }

        .alert:not(.d-none) {
            animation: alertPop 0.35s ease;
        }

        @keyframes alertPop {
            0% { opacity: 0; transform: translateY(-6px); }
            70% { opacity: 1; transform: translateY(2px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="login-shell">
        <div class="card p-4 p-md-5 login-card">
            <span class="brand-pill">🚐 Campus Transit</span>
            <h3 class="login-title">Shuttle System Login</h3>
            <p class="login-subtitle">Securely access your dashboard and manage trips in real time.</p>
            <div id="error-msg" class="alert alert-danger d-none"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login w-100">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store the JWT token and redirect
                    localStorage.setItem('token', data.session_token);
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.textContent = data.error || 'Login failed';
                    errorMsg.classList.remove('d-none');
                }
            } catch (err) {
                errorMsg.textContent = 'Server error. Please try again later.';
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
